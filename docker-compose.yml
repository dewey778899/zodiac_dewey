version: "3.9"

services:
  backend:
    image: registry.cn-shanghai.aliyuncs.com/dewey_zodiac/zodiac-dewey-backend:latest
    container_name: zodiac_backend
    restart: unless-stopped
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_URL=${AI_API_URL:-https://api.deepseek.com/chat/completions}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-8000}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-180}
      - DB_URL=${DB_URL:-jdbc:sqlite:/app/data/zodiac_dewey.db}
      - DB_DRIVER=${DB_DRIVER:-org.sqlite.JDBC}
      - HIBERNATE_DIALECT=${HIBERNATE_DIALECT:-org.hibernate.community.dialect.SQLiteDialect}
      - HIBERNATE_USE_GET_GENERATED_KEYS=${HIBERNATE_USE_GET_GENERATED_KEYS:-false}
      - JPA_DDL_AUTO=${JPA_DDL_AUTO:-update}
      - RATELIMIT_DAILY_TOTAL=${RATELIMIT_DAILY_TOTAL:-200}
      - RATELIMIT_PER_IP=${RATELIMIT_PER_IP:-3}
      - RATELIMIT_ENABLED=${RATELIMIT_ENABLED:-true}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - SERVER_PORT=8080
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_admin_password}
      - ADMIN_SESSION_HOURS=${ADMIN_SESSION_HOURS:-12}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_API_URL=${CLAUDE_API_URL:-https://api.anthropic.com/v1/messages}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-7}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-8000}
      - CLAUDE_TIMEOUT_SECONDS=${CLAUDE_TIMEOUT_SECONDS:-180}
      - AI_PROXY_HOST=${AI_PROXY_HOST:-}
      - AI_PROXY_PORT=${AI_PROXY_PORT:-0}
    volumes:
      - sqlite_data:/app/data
    networks:
      - zodiac-net

  frontend:
    image: registry.cn-shanghai.aliyuncs.com/dewey_zodiac/zodiac-dewey-frontend:latest
    container_name: zodiac_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zodiac-net

volumes:
  sqlite_data:

networks:
  zodiac-net:
    driver: bridge
