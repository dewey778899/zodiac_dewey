server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
  forward-headers-strategy: native

spring:
  application:
    name: zodiac-dewey

  # ============ 数据库 ============
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:zodiac_dewey}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate  # 生产用 validate;首次部署可改为 update 自动建表
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null

# ============ Claude API ============
claude:
  api:
    # 通过环境变量 CLAUDE_API_KEY 注入,不要硬编码
    key: ${CLAUDE_API_KEY:}
    url: ${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
    model: ${CLAUDE_MODEL:claude-opus-4-7}
    max-tokens: 8000
    timeout-seconds: 180
    anthropic-version: "2023-06-01"

# ============ 业务限流(防止 API 烧钱)============
ratelimit:
  # 全局每日总额度(超过后所有用户都无法生成)
  global-daily-limit: ${GLOBAL_DAILY_LIMIT:200}
  # 单 IP 每日额度
  ip-daily-limit: ${IP_DAILY_LIMIT:3}
  # 是否开启限流(false 时无限制,测试用)
  enabled: ${RATELIMIT_ENABLED:true}

# ============ CORS 跨域 ============
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# ============ 日志 ============
logging:
  level:
    com.zodiac.dewey: INFO
    org.hibernate.SQL: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
